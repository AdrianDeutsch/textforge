<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Clientseitige Single-Shot-Textwerkzeuge für OpenAI-kompatible LLM-Endpoints." />
    <meta name="color-scheme" content="dark light" />
    <title>Textforge — LLM Textwerkzeuge</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!--
      Apply the persisted (or system-preferred) theme before first paint to
      avoid a flash of the wrong colour scheme. Mirrors the logic in
      ThemeContext so the two stay in sync.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('llm_tools.theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
